<!DOCTYPE html>
<html lang="zh">
<head><meta charset="UTF-8"><title>十三境 · 修仙勋章</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a14;padding:40px;font-family:KaiTi,STKaiti,serif}
h1{color:#FFD700;text-align:center;font-size:32px;margin-bottom:6px}
.sub{color:#667;text-align:center;font-size:14px;margin-bottom:30px;letter-spacing:4px}
.wall{display:flex;flex-wrap:wrap;gap:20px;justify-content:center;max-width:840px;margin:0 auto}
.card{text-align:center;padding:10px;width:160px;background:rgba(255,255,255,0.02);border-radius:12px}
.card svg{width:150px;height:150px}
.card .nm{color:#999;font-size:13px;margin-top:6px}
.card .nm .idx{color:#445;font-size:10px}
.card .el{color:#555;font-size:10px;margin-top:2px}
</style></head>
<body>
<h1>十三境 · 修仙勋章</h1>
<p class="sub">「气筑丹婴化虚合乘真金太罗道」</p>
<div class="wall" id="wall"></div>
<script>
// Inline SVG data
const SVGS = [''' + ",\n".join([
    f'''`{open(f"D:/AI/StrideMoor/assets/badges/v3/svg/{r[0]}_lit.svg", encoding="utf-8").read()}`'''
    for r in [
        ("气","炼气","竹叶"),("筑","筑基","石台"),("丹","结丹","葫芦"),("婴","元婴","莲台"),
        ("化","化神","祥云"),("虚","练虚","飞剑"),("合","合体","八卦"),("乘","大乘","火焰"),
        ("真","真仙","仙鹤"),("金","金仙","龙纹"),("太","太乙","凤凰"),("罗","大罗","星辰"),("道","道祖","混沌")
    ]
]) + '''];
const NAMES = [["炼气","竹叶"],["筑基","石台"],["结丹","葫芦"],["元婴","莲台"],["化神","祥云"],["练虚","飞剑"],["合体","八卦"],["大乘","火焰"],["真仙","仙鹤"],["金仙","龙纹"],["太乙","凤凰"],["大罗","星辰"],["道祖","混沌"]];
const wall = document.getElementById('wall');
SVGS.forEach((svg,i)=>{
  const d=document.createElement('div');d.className='card';
  d.innerHTML=svg+`<div class="nm"><span class="idx">${i+1}</span>${NAMES[i][0]}</div><div class="el">· ${NAMES[i][1]} ·</div>`;
  wall.appendChild(d);
});
</script>
</body>
</html>
