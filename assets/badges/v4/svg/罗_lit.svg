<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200px" height="200px">
  <defs>
    <!-- Background gradient -->
    <radialGradient id="grd_罗" cx="40%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#F1C40F" stop-opacity="0.3"/>
      <stop offset="25%" stop-color="rgb(252,212,53)" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#D4AC0D" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="rgb(152,112,0)" stop-opacity="1"/>
    </radialGradient>
    
    <!-- Metal emboss filter for text -->
    <filter id="metal_罗">
      <!-- Shadow -->
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.6"/>
      <!-- Bevel/emboss -->
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.5" result="blur"/>
      <feSpecularLighting in="blur" surfaceScale="6" specularConstant="0.9" specularExponent="30" lighting-color="#ffffff" result="spec">
        <fePointLight x="-200" y="-400" z="800"/>
      </feSpecularLighting>
      <feComposite in="spec" in2="SourceAlpha" operator="in" result="specOut"/>
      <feComposite in="SourceGraphic" in2="specOut" operator="arithmetic" k1="0" k2="1" k3="1" k4="0"/>
    </filter>
    
    <!-- Glow filter for high-realm badges -->
    <filter id="glw_罗">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <!-- Outer glow -->
  <path d="M186.8,64.0 Q201.5,100.0 186.8,136.0 Q171.8,171.8 136.0,186.8 Q100.0,201.5 64.0,186.8 Q28.2,171.8 13.2,136.0 Q-1.5,100.0 13.2,64.0 Q28.2,28.2 64.0,13.2 Q100.0,-1.5 136.0,13.2 Q171.8,28.2 186.8,64.0 Z" fill="none" stroke="#F1C40F" stroke-width="3" opacity="0.12" filter="url(#glw_罗)"/>
  
  <!-- Main petal body -->
  <path d="M186.8,64.0 Q201.5,100.0 186.8,136.0 Q171.8,171.8 136.0,186.8 Q100.0,201.5 64.0,186.8 Q28.2,171.8 13.2,136.0 Q-1.5,100.0 13.2,64.0 Q28.2,28.2 64.0,13.2 Q100.0,-1.5 136.0,13.2 Q171.8,28.2 186.8,64.0 Z" fill="url(#grd_罗)" stroke="#D4AC0D" stroke-width="2.5"/>
  
  <!-- Inner border ring -->
  <path d="M179.5,67.1 Q191.2,100.0 179.5,132.9 Q164.5,164.5 132.9,179.5 Q100.0,191.2 67.1,179.5 Q35.5,164.5 20.5,132.9 Q8.8,100.0 20.5,67.1 Q35.5,35.5 67.1,20.5 Q100.0,8.8 132.9,20.5 Q164.5,35.5 179.5,67.1 Z" fill="none" stroke="#F1C40F" stroke-width="0.8" opacity="0.4"/>
  
  <!-- Inner dashed decorative ring -->
  <path d="M179.5,67.1 Q191.2,100.0 179.5,132.9 Q164.5,164.5 132.9,179.5 Q100.0,191.2 67.1,179.5 Q35.5,164.5 20.5,132.9 Q8.8,100.0 20.5,67.1 Q35.5,35.5 67.1,20.5 Q100.0,8.8 132.9,20.5 Q164.5,35.5 179.5,67.1 Z" fill="none" stroke="#D4AC0D" stroke-width="1" stroke-dasharray="3,3" opacity="0.25"/>
  
  <!-- Petal-tip dots -->
  <circle cx="197.0" cy="100.0" r="2.5" fill="#D4AC0D" opacity="0.7"/>
  <circle cx="168.6" cy="168.6" r="2.5" fill="#D4AC0D" opacity="0.7"/>
  <circle cx="100.0" cy="197.0" r="2.5" fill="#D4AC0D" opacity="0.7"/>
  <circle cx="31.4" cy="168.6" r="2.5" fill="#D4AC0D" opacity="0.7"/>
  <circle cx="3.0" cy="100.0" r="2.5" fill="#D4AC0D" opacity="0.7"/>
  <circle cx="31.4" cy="31.4" r="2.5" fill="#D4AC0D" opacity="0.7"/>
  <circle cx="100.0" cy="3.0" r="2.5" fill="#D4AC0D" opacity="0.7"/>
  <circle cx="168.6" cy="31.4" r="2.5" fill="#D4AC0D" opacity="0.7"/>
  
  
  <!-- Center character with metal emboss -->
  <text x="100" y="106" font-family="KaiTi,STKaiti,serif" font-size="68" font-weight="bold"
        fill="#D4AC0D" text-anchor="middle" filter="url(#metal_罗)" dominant-baseline="central">罗</text>
  
  <!-- Medal name -->
  <text x="100" y="186" font-family="KaiTi,STKaiti,serif" font-size="10" font-weight="bold"
        fill="#F1C40F" text-anchor="middle" opacity="0.6" letter-spacing="1">大罗勋章</text>
  
  <!-- Top highlight streak -->
  <ellipse cx="100" cy="67.1" rx="32.9" ry="7.5200000000000005" fill="#F1C40F" opacity="0.15"/>
</svg>