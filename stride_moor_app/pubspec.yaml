name: stride_moor
description: "驰陌 StrideMoor - 社交跑步教练 APP"
publish_to: 'none'
version: 2.2.5+100

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # 状态管理
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # 路由
  go_router: ^13.0.1

  # 网络
  dio: ^5.4.0

  # 本地存储 (Hive 支持 Web，sqflite 仅原生)
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  # sqflite: ^2.3.0
  path: ^1.8.3

  # 地图 — 高德社区版（调试中，暂时禁用排查真机崩溃）
  gmm_amap_flutter_base: ^3.1.4
  gmm_amap_flutter_map: ^3.1.4
  gmm_amap_flutter_location: ^3.1.4

  # BLE 蓝牙 (TODO: 仅支持 Android/iOS，Web 预览版已 stub)
  # flutter_blue_plus: ^1.31.0

  # 传感器
  # sensors_plus: ^4.0.2
  pedometer: ^4.0.1

  # 健康平台接入（Apple Health / Health Connect）
  health: ^13.1.4

  # 音频 & TTS (TODO: Web 兼容性问题，真机版再启用)
  # just_audio: ^0.9.36
  # flutter_tts: ^3.8.5

  # 推送（TODO: jpush_flutter 2.6.0 未适配 AGP 8.x namespace，后续升级）
  # jpush_flutter: ^2.4.9

  # GPS 定位（原生兜底，兼容 HarmonyOS）
  geolocator: ^11.1.0

  # 工具
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0
  intl: ^0.20.2
  flutter_screenutil: ^5.9.0
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  share_plus: ^7.2.1
  url_launcher: ^6.2.2
  permission_handler: ^11.1.0
  wakelock_plus: ^1.1.4
  flutter_background_service: 5.0.5
  device_info_plus: ^9.1.2
  package_info_plus: ^5.0.1
  logger: ^2.0.2
  shared_preferences: ^2.2.2
  image_picker: ^1.0.7
  flutter_tts: ^4.2.5
  huawei_health: ^6.16.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.7
  freezed: ^2.4.6
  json_serializable: ^6.7.1
  # TODO: 如需 Retrofit 代码生成，后续升级至兼容版本
  riverpod_generator: ^2.3.9
  hive_generator: ^2.0.1
  custom_lint: ^0.5.11
  riverpod_lint: ^2.3.7

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/images/
    - assets/audio/
    - assets/fonts/
    - assets/badges/paojing_small/
    - assets/badges/paojing_dim/

  # 本地字体（Bebas Neue 英文标题 + Noto Sans SC 中文正文）
  fonts:
    - family: BebasNeue
      fonts:
        - asset: assets/fonts/BebasNeue-Regular.ttf
    - family: NotoSansSC
      fonts:
        - asset: assets/fonts/NotoSansSC-Variable.ttf
